/// 16. โจทย์: สร้างตัวแปรและแสดงผลรวมของตัวเลขในอาร์เรย์
<!DOCTYPE html>
<html>
<head>
    <title>Sum Array</title>
</head>
<body>
    <script>
        let arr = [1, 2, 3, 4, 5];
        let sum = arr.reduce((a, b) => a + b, 0);
        document.body.innerHTML = "Sum: " + sum;
    </script>
</body>
</html>
