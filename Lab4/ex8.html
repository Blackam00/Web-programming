///  8. โจทย์: สร้างตัวแปรและแสดงข้อความที่มีการแทนที่ตัวอักษรบางตัว
<!DOCTYPE html>
<html>
<head>
    <title>Replace Character</title>
</head>
<body>
    <script>
        let str = "Hello, World!";
        let newStr = str.replace('World', 'JavaScript');
        document.body.innerHTML = newStr;
    </script>
</body>
</html>
