/// 20. โจทย์: สร้างตัวแปรและแสดงผลการรวมตัวเลขจากสองอาร์เรย์ (เติมส่วนที่ขาด)
<!DOCTYPE html>
<html>
<head>
    <title>Combine Arrays</title>
</head>
<body>
    <script>
        let arr1 = [1, 2, 3];
        let arr2 = [4, 5, 6];
        let combined = [...arr1, ...arr2];
        document.body.innerHTML = "Combined Array: " + combined.join(', ');
    </script>
</body>
</html>
