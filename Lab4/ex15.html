/// 15. โจทย์: สร้างตัวแปรและแสดงค่าตัวเลขที่เป็นค่าสูงสุดจากอาร์เรย์ของตัวเลข
<!DOCTYPE html>
<html>
<head>
    <title>Max Number</title>
</head>
<body>
    <script>
        let arr = [1, 2, 3, 4, 5];
        let max = Math.max(...arr);
        document.body.innerHTML = "Max: " + max;
    </script>
</body>
</html>
