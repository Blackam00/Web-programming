/// 19. โจทย์: สร้างตัวแปรและแสดงผลการแปลงข้อความเป็นตัวพิมพ์ใหญ่ตัวแรกของแต่ละคำ
<!DOCTYPE html>
<html>
<head>
    <title>Capitalize Words</title>
</head>
<body>
    <script>
        let str = "hello world";
        let capitalized = str.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        document.body.innerHTML = capitalized;
    </script>
</body>
</html>
