<!DOCTYPE html>
<html>
<head>
    <title>Multiply Variables</title>
</head>
<body>
    <script>
        let a = 5;
        let b = 10;
        let product = a * b;
        document.body.innerHTML = "Product: " + product;
    </script>
</body>
