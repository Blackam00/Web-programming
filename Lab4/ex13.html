/// 13. โจทย์: สร้างตัวแปรและแสดงผลการรวมข้อความสองข้อความ
<!DOCTYPE html>
<html>
<head>
    <title>Concatenate Strings</title>
</head>
<body>
    <script>
        let str1 = "Hello";
        let str2 = "World";
        let concatenated = str1 + " " + str2;
        document.body.innerHTML = concatenated;
    </script>
</body>
</html>
