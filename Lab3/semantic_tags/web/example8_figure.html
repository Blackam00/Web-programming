<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Figure Example</title>
        <style>
            figure {
                text-align: center;
                margin: 20px;
            }
            figcaption {
                font-style: italic;
                color: #555;
            }
        </style>
    </head>
    <body>
        <p><a href="index.html">← ย้อนกลับไปหน้าหลัก (Index)</a></p>
        <hr>
        <figure>
            <img src="https://www.w3schools.com/html/img_girl.jpg" alt="เด็กผู้หญิงกำลังยิ้ม" width="300">
            <figcaption>รูปภาพของเด็กผู้หญิงกำลังยิ้มสดใส</figcaption>
        </figure>
    </body>
</html>
